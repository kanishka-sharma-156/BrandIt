<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BRANDIT – Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <!-- LOGO -->
    <div class="login-logo">
      <div class="logo-icon">B</div>
      <h1>BRANDIT</h1>
      <p>Brand Management & Social Media Platform</p>
    </div>

    <!-- FORM -->
    <form onsubmit="handleLogin(event)">

      <div class="form-group">
        <label class="form-label">Your Name</label>
        <input
          type="text"
          class="form-input"
          id="username"
          placeholder="e.g. Alex Johnson"
          required
          autocomplete="off"
        />
      </div>

      <div class="form-group">
        <label class="form-label">Select Your Role</label>
        <select class="form-input" id="role">
          <option value="admin">Admin</option>
          <option value="manager">Social Media Manager</option>
          <option value="strategist">Brand Strategist</option>
          <option value="designer">Graphic Designer</option>
          <option value="writer">Copywriter</option>
        </select>
      </div>

      <!-- Error message -->
      <div id="error-msg" style="
        display:none;
        background:rgba(239,68,68,0.1);
        border:1px solid rgba(239,68,68,0.3);
        color:#FCA5A5;
        padding:10px 14px;
        border-radius:8px;
        font-size:13px;
        margin-bottom:16px;
      ">Please enter your name to continue.</div>

      <button type="submit" id="loginBtn" class="btn btn-primary w-full" style="
        justify-content:center;
        padding:13px;
        font-size:15px;
        border-radius:var(--radius-sm);
      ">
        Enter BRANDIT →
      </button>

    </form>

    <!-- QUICK SELECT -->
    <div style="margin-top:28px;">
      <p style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:14px;text-transform:uppercase;letter-spacing:1px;">Or quickly select a user</p>
      <div style="display:flex;flex-direction:column;gap:8px;">

        <div class="quick-user" onclick="quickLogin('Alex Johnson','admin')">
          <div class="avatar sm" style="background:linear-gradient(135deg,#7C3AED,#EC4899);">AJ</div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;">Alex Johnson</div>
            <div style="font-size:11px;color:var(--muted);">Admin</div>
          </div>
          <span style="font-size:11px;color:var(--primary-light);">→</span>
        </div>

        <div class="quick-user" onclick="quickLogin('Sara Johnson','manager')">
          <div class="avatar sm" style="background:linear-gradient(135deg,#7C3AED,#EC4899);">SJ</div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;">Sara Johnson</div>
            <div style="font-size:11px;color:var(--muted);">Social Media Manager</div>
          </div>
          <span style="font-size:11px;color:var(--primary-light);">→</span>
        </div>

        <div class="quick-user" onclick="quickLogin('James Kim','strategist')">
          <div class="avatar sm" style="background:linear-gradient(135deg,#F59E0B,#EF4444);">JK</div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;">James Kim</div>
            <div style="font-size:11px;color:var(--muted);">Brand Strategist</div>
          </div>
          <span style="font-size:11px;color:var(--primary-light);">→</span>
        </div>

        <div class="quick-user" onclick="quickLogin('Mike Torres','designer')">
          <div class="avatar sm" style="background:linear-gradient(135deg,#3B82F6,#8B5CF6);">MT</div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;">Mike Torres</div>
            <div style="font-size:11px;color:var(--muted);">Graphic Designer</div>
          </div>
          <span style="font-size:11px;color:var(--primary-light);">→</span>
        </div>

        <div class="quick-user" onclick="quickLogin('Priya Nair','strategist')">
          <div class="avatar sm" style="background:linear-gradient(135deg,#10B981,#3B82F6);">PN</div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;">Priya Nair</div>
            <div style="font-size:11px;color:var(--muted);">Content Strategist</div>
          </div>
          <span style="font-size:11px;color:var(--primary-light);">→</span>
        </div>

      </div>
    </div>

  </div>
</div>

<style>
  .quick-user {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s;
  }
  .quick-user:hover {
    background: rgba(124,58,237,0.1);
    border-color: var(--primary);
    transform: translateX(4px);
  }
</style>

<script>
  function handleLogin(e) {
    e.preventDefault();

    const name = document.getElementById('username').value.trim();
    const role = document.getElementById('role').value;

    if (!name) {
      document.getElementById('error-msg').style.display = 'block';
      return;
    }

    saveAndRedirect(name, role);
  }

  function quickLogin(name, role) {
    saveAndRedirect(name, role);
  }

  function saveAndRedirect(name, role) {
    // Save user info to localStorage
    localStorage.setItem('brandit_user', JSON.stringify({
      name: name,
      role: role,
      initials: getInitials(name)
    }));

    // Animate and redirect
    const btn = document.getElementById('loginBtn');
    btn.textContent = '✔ Welcome, ' + name + '!';
    btn.style.background = 'var(--success)';

    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 700);
  }

  function getInitials(name) {
    return name.split(' ')
      .map(n => n[0])
      .join('')
      .toUpperCase()
      .substring(0, 2);
  }
</script>

</body>
</html>
